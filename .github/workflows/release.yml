name: release

# Tag a release to build binaries:
#   git tag v0.3.0 && git push origin v0.3.0
# Publishing to crates.io is deliberately NOT automatic — run the `publish` job
# by hand (Actions → release → Run workflow → publish = true) once a
# CARGO_REGISTRY_TOKEN secret is set.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Also publish gene-core + gene-ai to crates.io"
        type: boolean
        default: false

permissions:
  contents: write # create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Desktop (GUI) builds for the platforms people run the app on.
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            features: default
          - name: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            features: default
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: default
          # Linux ships the headless build so it runs on servers/CI with no
          # X11/Wayland libraries present (the GUI build dynamically links them).
          - name: linux-x86_64-headless
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: headless
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (GUI)
        if: matrix.features == 'default'
        run: cargo build --release --locked -p gene-ai --target ${{ matrix.target }}

      - name: Build (headless)
        if: matrix.features == 'headless'
        run: cargo build --release --locked -p gene-ai --no-default-features --target ${{ matrix.target }}

      # Package the binary as <name>-<tag> with the platform's archive format,
      # plus a SHA256 so downloads can be verified.
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME:-dev}"
          stage="gene-${{ matrix.name }}-${ref}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/gene" "$stage/"
          cp README.md LICENSE "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ref = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $stage = "gene-${{ matrix.name }}-$ref"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gene.exe" $stage
          Copy-Item README.md, LICENSE $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash.ToLower() + "  $stage.zip" | Out-File -Encoding ascii "$stage.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: gene-${{ matrix.name }}
          path: |
            gene-${{ matrix.name }}-*.tar.gz
            gene-${{ matrix.name }}-*.tar.gz.sha256
            gene-${{ matrix.name }}-*.zip
            gene-${{ matrix.name }}-*.zip.sha256
          if-no-files-found: error

  release:
    name: github release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish:
    name: crates.io
    needs: build
    # Manual, opt-in only: never runs on a tag push, only via a dispatch with the
    # box ticked. Order matters — gene-core must be on crates.io before gene-ai.
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Package gene-core for real before the irreversible publish — catches
      # metadata/compile problems while they're still recoverable. (gene-ai can't
      # be dry-run until gene-core is actually on the index, so it isn't here.)
      - run: cargo publish -p gene-core --dry-run --locked
      - run: cargo publish -p gene-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # gene-ai's publish verify-builds the GUI crate, which needs the egui libs;
      # gene-core above does not, so install them only now.
      - name: Install egui build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev
      - run: cargo publish -p gene-ai --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
