name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The gene-core path dep carries a literal version that Cargo can't inherit
      # from [workspace.package]; guard it so a version bump can't silently ship a
      # stale dependency requirement to crates.io.
      - name: gene-core dep version matches workspace version
        run: |
          ws=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -1)
          dep=$(sed -nE 's/.*gene-core = \{.*version = "([^"]+)".*/\1/p' crates/gene/Cargo.toml)
          echo "workspace=$ws gene-core dep=$dep"
          if [ -z "$ws" ] || [ "$ws" != "$dep" ]; then
            echo "::error::crates/gene gene-core dep version ($dep) != workspace version ($ws)"
            exit 1
          fi
      - name: Install egui build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: clippy (headless, no gui)
        run: cargo clippy -p gene-ai --no-default-features --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install egui build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev
      # The default-feature (GUI) build + tests, on every platform.
      - run: cargo test --workspace --locked
      - run: cargo build --workspace --locked

  headless:
    # The GUI-less CLI must build with no windowing-system dependencies, on every platform.
    name: headless CLI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p gene-ai --no-default-features --locked
